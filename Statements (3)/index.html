<!DOCTYPE html>
<html lang="en">
<body>
    
    <h2> JavaScript Statements </h2>
    <p> JavaScript code blocks are written between { and } </p>

    <button type="button" onclick="myFunction()"> CLICK ME :) </button>

    <p id="demo1"> </p>
    <p id="demo2"> </p>

    <script>
        function myFunction() {
            document.getElementById("demo1").innerHTML = "What's up man?";
            document.getElementById("demo2").innerHTML = "How have you been?";
        }
    </script>

</body>
</html>
